name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    shell: bash

jobs:
  metadata:
    name: Release metadata
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - name: Verify release metadata
        run: |
          git diff --check
          bash -n script/*.sh
          python3 -m py_compile script/merge_beta_appcast.py
          ./script/verify_release_metadata.sh

  build:
    name: Build
    runs-on: macos-26
    timeout-minutes: 30
    env:
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
    steps:
      - uses: actions/checkout@v7

      - name: Verify current Apple toolchain
        run: ./script/verify_apple_toolchain.sh

      - name: Install tools
        run: brew install xcodegen

      - name: Generate Xcode project
        run: ./script/prepare_xcode_project.sh

      - name: Build
        run: |
          set -o pipefail
          xcodebuild \
            -project MacPhone.xcodeproj \
            -scheme MacPhone \
            -configuration Debug \
            -destination 'generic/platform=macOS' \
            -derivedDataPath .build/ci \
            -onlyUsePackageVersionsFromResolvedFile \
            -skipPackageUpdates \
            MACPHONE_WARNINGS_AS_ERRORS=YES \
            build | tail -30

      - name: Verify bundled release resources
        run: |
          app=".build/ci/Build/Products/Debug/MacPhone.app"
          ./script/verify_binary_sdk.sh "$app/Contents/MacOS/MacPhone"
          test -f "$app/Contents/Resources/AppIcon.icns"
          test -f "$app/Contents/Resources/bridge/macphone_netsim_bridge.py"
          test ! -e "$app/Contents/Resources/bridge/.venv"
          test ! -e "$app/Contents/Resources/bridge/m365_scooter.py"
          test ! -e "$app/Contents/Resources/bridge/ninebot_scooter.py"

      - name: Launch smoke test
        run: |
          set -euo pipefail
          app=".build/ci/Build/Products/Debug/MacPhone.app"
          "$app/Contents/MacOS/MacPhone" >.build/ci-launch.log 2>&1 &
          pid=$!
          sleep 5
          kill -0 "$pid"
          kill "$pid"
          wait "$pid" || true
